steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build image'
    dir: 'web'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ai-trade-web:$COMMIT_SHA'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push image'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/ai-trade-web:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ai-trade-web'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ai-trade-web:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NEXT_PUBLIC_SITE_URL=$(_NEXT_PUBLIC_SITE_URL),NEXT_PUBLIC_CMS_URL=$(_NEXT_PUBLIC_CMS_URL),NEXT_PUBLIC_RECAPTCHA_SITE_KEY=$(_NEXT_PUBLIC_RECAPTCHA_SITE_KEY)'

images:
  - 'gcr.io/$PROJECT_ID/ai-trade-web:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
